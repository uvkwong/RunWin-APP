name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.1
        bundler-cache: true
    
    - name: Install Fastlane
      run: gem install fastlane
    
    - name: Install CocoaPods
      run: sudo gem install cocoapods
    
    - name: Rename project to ASCII (fix Chinese path encoding)
      run: |
        cd sourcecode
        # Rename folder and project to ASCII names
        mv "ç‘žčŤŁAPP" "RunWinApp"
        mv "ç‘žčŤŁAPP.xcodeproj" "RunWinApp.xcodeproj"
        # Fix references inside pbxproj
        sed -i '' 's/ç‘žčŤŁAPP/RunWinApp/g' RunWinApp.xcodeproj/project.pbxproj
        # Fix Podfile target name
        sed -i '' "s/target 'ç‘žčŤŁAPP'/target 'RunWinApp'/" Podfile

    - name: Install Pod dependencies
      run: cd sourcecode && pod install

    - name: Build iOS App (Archive)
      run: |
        cd sourcecode
        xcodebuild archive \
          -workspace RunWinApp.xcworkspace \
          -scheme RunWinApp \
          -configuration Release \
          -archivePath build/RunWinApp.xcarchive \
          -arch arm64 \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          PROVISIONING_PROFILE="" \
          PROVISIONING_PROFILE_SPECIFIER=""
    
    - name: Create IPA (package .app directly, skip signing)
      run: |
        cd sourcecode
        # Find the .app inside the archive
        APP_PATH=$(find build/RunWinApp.xcarchive -name "*.app" -type d | head -1)
        echo "Found .app at: $APP_PATH"
        # Package into IPA manually (no signing needed)
        mkdir -p build/ipa/Payload
        cp -r "$APP_PATH" build/ipa/Payload/
        cd build/ipa
        zip -r RunWinApp.ipa Payload/
        echo "IPA created: $(ls -lh RunWinApp.ipa)"
    
    - name: Upload to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RunWin-APP.ipa
        path: sourcecode/build/ipa/RunWinApp.ipa
    
    - name: Upload to Pgyer (č’˛ĺ…¬č‹±)
      env:
        PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}
      run: |
        if [ -z "$PGYER_API_KEY" ]; then
          echo "âš ď¸Ź PGYER_API_KEY not set, skipping Pgyer upload"
        else
          curl -F "file=@sourcecode/build/ipa/*.ipa" \
            -F "uKey=$PGYER_API_KEY" \
            https://www.pgyer.com/api/app/upload
        fi
