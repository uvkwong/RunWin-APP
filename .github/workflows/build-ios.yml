name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.1
        bundler-cache: true
    
    - name: Install Fastlane
      run: gem install fastlane
    
    - name: Install CocoaPods
      run: sudo gem install cocoapods
    
    - name: Rename project to ASCII (fix Chinese path encoding)
      run: |
        cd sourcecode
        # Rename folder and project to ASCII names
        mv "瑞荣APP" "RunWinApp"
        mv "瑞荣APP.xcodeproj" "RunWinApp.xcodeproj"
        # Fix references inside pbxproj
        sed -i '' 's/瑞荣APP/RunWinApp/g' RunWinApp.xcodeproj/project.pbxproj
        # Fix Podfile target name
        sed -i '' "s/target '瑞荣APP'/target 'RunWinApp'/" Podfile

    - name: Install Pod dependencies
      run: cd sourcecode && pod install

    - name: Build iOS App (Archive)
      run: |
        cd sourcecode
        xcodebuild archive \
          -workspace RunWinApp.xcworkspace \
          -scheme RunWinApp \
          -configuration Release \
          -archivePath build/RunWinApp.xcarchive \
          -arch arm64 \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          PROVISIONING_PROFILE="" \
          PROVISIONING_PROFILE_SPECIFIER=""
    
    - name: Create IPA
      run: |
        cd sourcecode
        xcodebuild -exportArchive \
          -archivePath build/RunWinApp.xcarchive \
          -exportPath build/ipa \
          -exportOptionsPlist ExportOptions.plist \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
    
    - name: Upload to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RunWin-APP.ipa
        path: sourcecode/build/ipa/*.ipa
    
    - name: Upload to Pgyer (蒲公英)
      env:
        PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}
      run: |
        if [ -z "$PGYER_API_KEY" ]; then
          echo "⚠️ PGYER_API_KEY not set, skipping Pgyer upload"
        else
          curl -F "file=@sourcecode/build/ipa/*.ipa" \
            -F "uKey=$PGYER_API_KEY" \
            https://www.pgyer.com/api/app/upload
        fi
